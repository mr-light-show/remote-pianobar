name: Build ARM64 builder images

# Builds per-distro ARM64 builder images with all remote-pianobar build deps
# preinstalled and pushes them to GHCR. release.yml's build-arm64 job pulls these
# instead of running apt-get inside an emulated container on every release.
#
# Rebuild triggers:
#   - manual dispatch
#   - changes to the Dockerfile, dep list, or this workflow on main
#   - monthly cron (pick up base-image security updates)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/docker/Dockerfile.arm64-build'
      - '.github/docker/arm64-build-deps.txt'
      - '.github/workflows/builder-images.yml'
  schedule:
    - cron: '0 6 1 * *'

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    name: Build ${{ matrix.tag }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - base: "debian:bookworm"
            tag: "bookworm-arm64"
          - base: "debian:trixie"
            tag: "trixie-arm64"
          - base: "ubuntu:noble"
            tag: "noble-arm64"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image repo
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}-build" >> "$GITHUB_OUTPUT"

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .github/docker
          file: .github/docker/Dockerfile.arm64-build
          platforms: linux/arm64
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
          tags: ghcr.io/${{ steps.repo.outputs.name }}:${{ matrix.tag }}
          push: true
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}

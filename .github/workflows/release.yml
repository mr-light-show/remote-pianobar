name: Build and Release

# GitHub "immutable releases" (org/repo setting) block adding or replacing assets
# after a release is published. Triggers on `published` run too late — uploads get
# HTTP 422. Use `created` so CI runs when the release is created (create a DRAFT
# release for the tag, let this workflow upload .deb/.dmg, then click Publish).
permissions:
  contents: write

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.3). Created at the dispatched branch HEAD if missing; a draft release is created automatically.'
        required: true
        type: string

jobs:
  prepare:
    name: Set version and tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.set.outputs.version }}
      release_tag: ${{ steps.set.outputs.release_tag }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            RELEASE_TAG="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$RELEASE_TAG" ]; then
            echo "::error::No tag: provide tag input for workflow_dispatch or create a release for release event"
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      # Build jobs checkout ref: ${{ needs.prepare.outputs.release_tag }}. A draft
      # release alone does not create refs/tags/<tag> until publish — ensure the tag
      # exists before any build job runs.
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref }}

      - name: Ensure git tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.set.outputs.release_tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists on origin"
            exit 0
          fi
          COMMIT="$(git rev-parse HEAD)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release ${RELEASE_TAG}" "$COMMIT"
          git push origin "refs/tags/${RELEASE_TAG}"
          echo "Created and pushed tag ${RELEASE_TAG} at ${COMMIT}"

      - name: Ensure GitHub release exists
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ steps.set.outputs.release_tag }}"
          gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" || \
            gh release create "$RELEASE_TAG" --repo "${{ github.repository }}" \
              --draft --title "$RELEASE_TAG" --notes "Building packages… publish after CI uploads assets."

  build-amd64:
    name: Build Linux Package (noble_amd64)
    runs-on: ubuntu-24.04
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Update version from tag
        run: |
          echo "Updating version to: $VERSION"
          sed -i 's/#define VERSION ".*"/#define VERSION "'"$VERSION"'"/' src/config.h
          grep VERSION src/config.h
      
      - name: Install APT packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libao-dev libcurl4-openssl-dev libgcrypt20-dev libjson-c-dev \
            libavcodec-dev libavformat-dev libavfilter-dev libavutil-dev libswresample-dev \
            libwebsockets-dev libasound2-dev libblas-dev liblapack-dev check \
            python3-yaml

      - name: Ensure BLAS/LAPACK installed (required by libsphinxbase)
        run: sudo apt-get update && sudo apt-get install -y libblas-dev liblapack-dev
      
      - name: Setup Node.js with caching
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
        
      - name: Build pianobar and Web UI
        run: |
          # Enable debug logging for pre-release builds
          DEBUG_FLAGS=""
          if [[ "$VERSION" == *"pre"* ]]; then
            echo "Pre-release build detected, enabling debug logging"
            DEBUG_FLAGS="-DHAVE_DEBUGLOG"
          fi
          
          # Build pianobar
          make WEBSOCKET=1 CFLAGS="$DEBUG_FLAGS" clean
          make WEBSOCKET=1 CFLAGS="$DEBUG_FLAGS"
          
          # Build Web UI
          cd webui
          npm ci
          npm run build
          cd ..
      
      - name: Create package structure
        run: |
          mkdir -p package/usr/local/bin
          mkdir -p package/usr/local/share/pianobar/webui
          mkdir -p package/usr/local/share/doc/pianobar
          mkdir -p package/usr/local/share/man/man1
          mkdir -p package/DEBIAN
          
          # Copy binary
          cp pianobar package/usr/local/bin/
          
          # Copy web UI
          cp -r dist/webui/* package/usr/local/share/pianobar/webui/
          
          # Copy documentation
          cp README.md package/usr/local/share/doc/pianobar/
          cp CONFIG.md package/usr/local/share/doc/pianobar/
          cp DEVELOPMENT.md package/usr/local/share/doc/pianobar/
          cp README_TESTING.md package/usr/local/share/doc/pianobar/
          cp -r contrib package/usr/local/share/doc/pianobar/
          
          # Copy man page
          cp contrib/pianobar.1 package/usr/local/share/man/man1/
          
      - name: Create Debian control file
        run: |
          # Detect actual library dependencies from the binary
          echo "=== Detecting library dependencies ==="
          ldd pianobar | grep "=>" || true
          
          # Extract exact library versions
          AVCODEC=$(ldd pianobar | grep libavcodec | sed -n 's/.*libavcodec\.so\.\([0-9]*\).*/libavcodec\1/p')
          AVFORMAT=$(ldd pianobar | grep libavformat | sed -n 's/.*libavformat\.so\.\([0-9]*\).*/libavformat\1/p')
          AVFILTER=$(ldd pianobar | grep libavfilter | sed -n 's/.*libavfilter\.so\.\([0-9]*\).*/libavfilter\1/p')
          AVUTIL=$(ldd pianobar | grep libavutil | sed -n 's/.*libavutil\.so\.\([0-9]*\).*/libavutil\1/p')
          SWRESAMPLE=$(ldd pianobar | grep libswresample | sed -n 's/.*libswresample\.so\.\([0-9]*\).*/libswresample\1/p')
          WEBSOCKETS=$(ldd pianobar | grep libwebsockets | sed -n 's/.*libwebsockets\.so\.\([0-9]*\).*/libwebsockets\1/p')
          
          echo "Detected FFmpeg libavcodec: $AVCODEC"
          echo "Detected FFmpeg libavformat: $AVFORMAT"
          echo "Detected FFmpeg libavfilter: $AVFILTER"
          echo "Detected FFmpeg libavutil: $AVUTIL"
          echo "Detected FFmpeg libswresample: $SWRESAMPLE"
          echo "Detected libwebsockets: $WEBSOCKETS"
          
          # Build dependency string with exact versions
          DEPENDS="libao4, libcurl4, libgcrypt20, libjson-c5"
          [ -n "$AVCODEC" ] && DEPENDS="$DEPENDS, $AVCODEC"
          [ -n "$AVFORMAT" ] && DEPENDS="$DEPENDS, $AVFORMAT"
          [ -n "$AVFILTER" ] && DEPENDS="$DEPENDS, $AVFILTER"
          [ -n "$AVUTIL" ] && DEPENDS="$DEPENDS, $AVUTIL"
          [ -n "$SWRESAMPLE" ] && DEPENDS="$DEPENDS, $SWRESAMPLE"
          [ -n "$WEBSOCKETS" ] && DEPENDS="$DEPENDS, $WEBSOCKETS"
          
          echo "Final dependencies: $DEPENDS"
          
          cat > package/DEBIAN/control << EOF
          Package: remote-pianobar
          Version: $VERSION
          Section: sound
          Priority: optional
          Architecture: amd64
          Depends: $DEPENDS
          Maintainer: Remote Pianobar <remote-pianobar@github.com>
          Homepage: https://github.com/mr-light-show/remote-pianobar
          Description: Remote Pianobar - Console-based Pandora client with remote control
           Pianobar is a free/open-source, console-based client for Pandora.
           Remote Pianobar enables building custom UIs (web, mobile, desktop) with remote control.
           .
           Features:
            - Play and manage stations
            - Rate songs and explain why they were selected
            - WebSocket API for custom UIs
            - Modern web interface included
            - Remote control via WebSocket
          EOF
          
          echo "=== Generated Control File ==="
          cat package/DEBIAN/control
          
      - name: Create post-install script
        run: |
          cat > package/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e
          
          # Create config directory for users
          echo "Remote Pianobar installed successfully!"
          echo ""
          echo "To configure pianobar, create ~/.config/pianobar/config"
          echo "Example configuration: /usr/local/share/doc/pianobar/contrib/config-example"
          echo ""
          echo "For WebSocket/Web UI setup, see:"
          echo "  /usr/local/share/doc/pianobar/README.md"
          echo "  /usr/local/share/doc/pianobar/CONFIG.md"
          echo ""
          echo "Web UI files are located at: /usr/local/share/pianobar/webui"
          
          exit 0
          EOF
          
          chmod 755 package/DEBIAN/postinst
          
      - name: Build .deb package
        run: dpkg-deb --build package remote-pianobar_noble_amd64.deb

      - name: Upload to release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(remote-pianobar_*.deb)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No .deb files to upload"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"

  build-arm64:
    name: Build ARM64 Package (${{ matrix.pkg_name }})
    runs-on: ubuntu-24.04
    needs: prepare
    permissions:
      contents: write
      packages: read
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    strategy:
      matrix:
        include:
          - image: "ghcr.io/mr-light-show/remote-pianobar-build:bookworm-arm64"
            base: "debian:bookworm"
            pkg_name: "bookworm"
          - image: "ghcr.io/mr-light-show/remote-pianobar-build:trixie-arm64"
            base: "debian:trixie"
            pkg_name: "trixie"
          - image: "ghcr.io/mr-light-show/remote-pianobar-build:noble-arm64"
            base: "ubuntu:noble"
            pkg_name: "noble"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      
      - name: Update version from tag
        run: |
          echo "Updating version to: $VERSION"
          sed -i 's/#define VERSION ".*"/#define VERSION "'"$VERSION"'"/' src/config.h
          grep VERSION src/config.h
      
      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare ARM64 builder image (pull or build)
        run: |
          # Prefer the prebuilt image from GHCR (built by builder-images.yml).
          # Fall back to building it locally so a release is never blocked by a
          # missing/not-yet-published image. Either way the image is tagged
          # ${{ matrix.image }} locally for the build and ldd steps below.
          if docker pull --platform linux/arm64 "${{ matrix.image }}"; then
            echo "Using prebuilt builder image from GHCR."
          else
            echo "::warning::Builder image ${{ matrix.image }} unavailable; building it locally (slower)."
            docker buildx build --platform linux/arm64 \
              --build-arg BASE_IMAGE="${{ matrix.base }}" \
              -t "${{ matrix.image }}" \
              --load \
              .github/docker
          fi

      - name: Build pianobar and Web UI
        run: |
          # Enable debug logging for pre-release builds
          DEBUG_FLAGS=""
          if [[ "$VERSION" == *"pre"* ]]; then
            echo "Pre-release build detected, enabling debug logging"
            DEBUG_FLAGS="-DHAVE_DEBUGLOG"
          fi

          # Builder image (built by builder-images.yml) ships all deps preinstalled,
          # so no apt-get here — just compile the C binary and the Web UI.
          docker run --platform linux/arm64 --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e DEBUG_FLAGS="$DEBUG_FLAGS" \
            ${{ matrix.image }} \
            bash -c '
              make WEBSOCKET=1 CFLAGS="$DEBUG_FLAGS" clean && \
              make WEBSOCKET=1 CFLAGS="$DEBUG_FLAGS" && \
              cd webui && \
              npm ci && \
              npm run build
            '
      
      - name: Create package structure
        run: |
          mkdir -p package/usr/local/bin
          mkdir -p package/usr/local/share/pianobar/webui
          mkdir -p package/usr/local/share/doc/pianobar
          mkdir -p package/usr/local/share/man/man1
          mkdir -p package/DEBIAN
          
          # Copy binary
          cp pianobar package/usr/local/bin/
          
          # Copy web UI
          cp -r dist/webui/* package/usr/local/share/pianobar/webui/
          
          # Copy documentation
          cp README.md package/usr/local/share/doc/pianobar/
          cp CONFIG.md package/usr/local/share/doc/pianobar/
          cp DEVELOPMENT.md package/usr/local/share/doc/pianobar/
          cp README_TESTING.md package/usr/local/share/doc/pianobar/
          cp -r contrib package/usr/local/share/doc/pianobar/
          
          # Copy man page
          cp contrib/pianobar.1 package/usr/local/share/man/man1/
          
      - name: Create Debian control file
        run: |
          # Detect dependencies by running ldd inside ARM64 container
          echo "=== Detecting library dependencies ==="
          
          DEPS=$(docker run --platform linux/arm64 --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            ${{ matrix.image }} \
            bash -c "ldd pianobar | grep '=>' || true")
          echo "$DEPS"
          
          AVCODEC=$(echo "$DEPS" | grep libavcodec | sed -n 's/.*libavcodec\.so\.\([0-9]*\).*/libavcodec\1/p')
          AVFORMAT=$(echo "$DEPS" | grep libavformat | sed -n 's/.*libavformat\.so\.\([0-9]*\).*/libavformat\1/p')
          AVFILTER=$(echo "$DEPS" | grep libavfilter | sed -n 's/.*libavfilter\.so\.\([0-9]*\).*/libavfilter\1/p')
          AVUTIL=$(echo "$DEPS" | grep libavutil | sed -n 's/.*libavutil\.so\.\([0-9]*\).*/libavutil\1/p')
          SWRESAMPLE=$(echo "$DEPS" | grep libswresample | sed -n 's/.*libswresample\.so\.\([0-9]*\).*/libswresample\1/p')
          WEBSOCKETS=$(echo "$DEPS" | grep libwebsockets | sed -n 's/.*libwebsockets\.so\.\([0-9]*\).*/libwebsockets\1/p')
          
          echo "Detected: $AVCODEC $AVFORMAT $AVFILTER $AVUTIL $SWRESAMPLE $WEBSOCKETS"
          
          DEPENDS="libao4, libcurl4, libgcrypt20, libjson-c5"
          [ -n "$AVCODEC" ] && DEPENDS="$DEPENDS, $AVCODEC"
          [ -n "$AVFORMAT" ] && DEPENDS="$DEPENDS, $AVFORMAT"
          [ -n "$AVFILTER" ] && DEPENDS="$DEPENDS, $AVFILTER"
          [ -n "$AVUTIL" ] && DEPENDS="$DEPENDS, $AVUTIL"
          [ -n "$SWRESAMPLE" ] && DEPENDS="$DEPENDS, $SWRESAMPLE"
          [ -n "$WEBSOCKETS" ] && DEPENDS="$DEPENDS, $WEBSOCKETS"
          
          cat > package/DEBIAN/control << EOF
          Package: remote-pianobar
          Version: $VERSION
          Section: sound
          Priority: optional
          Architecture: arm64
          Depends: $DEPENDS
          Maintainer: Remote Pianobar <remote-pianobar@github.com>
          Homepage: https://github.com/mr-light-show/remote-pianobar
          Description: Remote Pianobar - Console-based Pandora client with remote control
           Pianobar is a free/open-source, console-based client for Pandora.
           Remote Pianobar enables building custom UIs (web, mobile, desktop) with remote control.
           .
           Features:
            - Play and manage stations
            - Rate songs and explain why they were selected
            - WebSocket API for custom UIs
            - Modern web interface included
            - Remote control via WebSocket
          EOF
          
      - name: Create post-install script
        run: |
          cat > package/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e
          
          echo "Remote Pianobar installed successfully!"
          echo ""
          echo "To configure pianobar, create ~/.config/pianobar/config"
          echo "Example configuration: /usr/local/share/doc/pianobar/contrib/config-example"
          echo ""
          echo "For WebSocket/Web UI setup, see:"
          echo "  /usr/local/share/doc/pianobar/README.md"
          echo "  /usr/local/share/doc/pianobar/CONFIG.md"
          echo ""
          echo "Web UI files are located at: /usr/local/share/pianobar/webui"
          
          exit 0
          EOF
          
          chmod 755 package/DEBIAN/postinst
          
      - name: Build .deb package
        run: dpkg-deb --build package remote-pianobar_${{ matrix.pkg_name }}_arm64.deb
          
      - name: Upload to release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          f="remote-pianobar_${{ matrix.pkg_name }}_arm64.deb"
          if [ ! -f "$f" ]; then
            echo "::error::Missing $f"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "$f" --clobber --repo "${{ github.repository }}"

  build-macos:
    name: Build macOS 14 Package
    runs-on: macos-14
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      # Homebrew paths for M1 (/opt/homebrew) and Intel (/usr/local)
      PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig
      CPATH: /opt/homebrew/include:/usr/local/include
      LIBRARY_PATH: /opt/homebrew/lib:/usr/local/lib
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
        
      - name: Update version from tag
        run: |
          echo "Updating version to: $VERSION"
          sed -i '' 's/#define VERSION ".*"/#define VERSION "'"$VERSION"'"/' src/config.h
          grep VERSION src/config.h
      
      - name: Cache Homebrew packages
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar
            /opt/homebrew/Cellar
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-
        
      - name: Install dependencies
        run: |
          brew update
          brew install \
            libao \
            curl \
            libgcrypt \
            json-c \
            ffmpeg \
            libwebsockets \
            check \
            node \
            create-dmg
          # Ensure packages are linked (cache may restore Cellar but not symlinks)
          brew link --overwrite ffmpeg json-c libwebsockets libgcrypt libao || true
          # Makefile runs pkg-config for `check` on every invocation when WEBSOCKET=1 (test flags).
          # Locale codegen (make → pianobar → locale-codegen) needs PyYAML.
          python3 -m pip install pyyaml --break-system-packages

      - name: Setup Node.js with caching
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
      
      - name: Build Remote Pianobar
        run: |
          # Enable debug logging for pre-release builds
          DEBUG_FLAGS=""
          if [[ "$VERSION" == *"pre"* ]]; then
            echo "Pre-release build detected, enabling debug logging"
            DEBUG_FLAGS="-DHAVE_DEBUGLOG"
          fi
          
          make WEBSOCKET=1 clean
          make WEBSOCKET=1 CFLAGS="-g -O0 -DWEBSOCKET_ENABLED $DEBUG_FLAGS"
          
      - name: Build Web UI
        run: |
          cd webui
          npm ci
          npm run build
          cd ..
          
      - name: Create app bundle structure
        run: |
          APP_NAME="Remote-Pianobar-${VERSION}"
          
          mkdir -p "${APP_NAME}/bin"
          mkdir -p "${APP_NAME}/share/pianobar/webui"
          mkdir -p "${APP_NAME}/share/doc/pianobar"
          mkdir -p "${APP_NAME}/share/man/man1"
          
          # Copy binary
          cp pianobar "${APP_NAME}/bin/"
          
          # Copy web UI
          cp -r dist/webui/* "${APP_NAME}/share/pianobar/webui/"
          
          # Copy documentation
          cp README.md "${APP_NAME}/share/doc/pianobar/"
          cp CONFIG.md "${APP_NAME}/share/doc/pianobar/"
          cp DEVELOPMENT.md "${APP_NAME}/share/doc/pianobar/"
          cp README_TESTING.md "${APP_NAME}/share/doc/pianobar/"
          cp -r contrib "${APP_NAME}/share/doc/pianobar/"
          
          # Copy man page
          cp contrib/pianobar.1 "${APP_NAME}/share/man/man1/"
          
          # Create installation instructions
          cat > "${APP_NAME}/INSTALL.txt" << 'EOF'
          Remote Pianobar
          ===============
          
          Installation:
          
          1. Copy the 'bin/pianobar' binary to a location in your PATH:
             sudo cp bin/pianobar /usr/local/bin/
          
          2. Copy the web UI files:
             sudo mkdir -p /usr/local/share/pianobar
             sudo cp -r share/pianobar/webui /usr/local/share/pianobar/
          
          3. (Optional) Install documentation:
             sudo cp -r share/doc/pianobar /usr/local/share/doc/
             sudo cp share/man/man1/pianobar.1 /usr/local/share/man/man1/
          
          Configuration:
          
          1. Create config directory:
             mkdir -p ~/.config/pianobar
          
          2. Create config file (~/.config/pianobar/config):
             user = your_email@example.com
             password = your_password
             
             # WebSocket settings
             ui_mode = both
             websocket_port = 8080
             webui_path = /usr/local/share/pianobar/webui
          
          3. Run pianobar:
             pianobar
          
          4. Open web interface:
             http://localhost:8080
          
          For more information, see share/doc/pianobar/README.md
          
          Dependencies:
          
          If you installed via Homebrew, dependencies should already be installed.
          Otherwise, install:
            brew install libao curl libgcrypt json-c ffmpeg libwebsockets
          EOF
          
          # Create simple install script
          cat > "${APP_NAME}/install.sh" << 'EOF'
          #!/bin/bash
          set -e
          
          echo "Installing Remote Pianobar..."
          echo ""
          
          # Check for sudo
          if [ "$EUID" -ne 0 ]; then
            echo "This script needs sudo privileges to install to /usr/local"
            echo "You may be prompted for your password."
            echo ""
          fi
          
          # Install binary
          sudo cp bin/pianobar /usr/local/bin/
          echo "✓ Installed binary to /usr/local/bin/pianobar"
          
          # Install web UI
          sudo mkdir -p /usr/local/share/pianobar
          sudo cp -r share/pianobar/webui /usr/local/share/pianobar/
          echo "✓ Installed web UI to /usr/local/share/pianobar/webui"
          
          # Install documentation
          sudo mkdir -p /usr/local/share/doc
          sudo cp -r share/doc/pianobar /usr/local/share/doc/
          echo "✓ Installed documentation to /usr/local/share/doc/pianobar"
          
          # Install man page
          sudo mkdir -p /usr/local/share/man/man1
          sudo cp share/man/man1/pianobar.1 /usr/local/share/man/man1/
          echo "✓ Installed man page"
          
          echo ""
          echo "Installation complete!"
          echo ""
          echo "Next steps:"
          echo "1. Create config directory: mkdir -p ~/.config/pianobar"
          echo "2. Create config file: ~/.config/pianobar/config"
          echo "3. See share/doc/pianobar/contrib/config-example for configuration examples"
          echo "4. Run: pianobar"
          echo ""
          EOF
          
          chmod +x "${APP_NAME}/install.sh"
          
      - name: Create DMG
        run: |
          APP_NAME="Remote-Pianobar-${VERSION}"
          DMG_NAME="remote-pianobar_macos14.dmg"
          
          create-dmg \
            --volname "Remote Pianobar" \
            --volicon "contrib/pianobar.icns" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --text-size 12 \
            --app-drop-link 600 185 \
            "${DMG_NAME}" \
            "${APP_NAME}" \
            || true
          
          # Fallback if create-dmg fails (missing icon, etc)
          if [ ! -f "${DMG_NAME}" ]; then
            echo "create-dmg failed, using hdiutil instead..."
            hdiutil create -volname "Remote Pianobar" -srcfolder "${APP_NAME}" -ov -format UDZO "${DMG_NAME}"
          fi
          
      - name: Upload to release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(remote-pianobar_*.dmg)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No .dmg files to upload"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"

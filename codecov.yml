# https://docs.codecov.com/docs/codecovyml-reference
# Patch status: changed lines must meet target (see AGENTS.md).
coverage:
  status:
    project: off
    patch:
      default:
        target: 90%
        informational: false
        paths:
          - "src/**"
          - "webui/src/**"
      c-tests:
        target: 90%
        informational: false
        paths:
          - "src/**"
      web-tests:
        target: 90%
        informational: false
        paths:
          - "webui/src/**"

ignore:
  - "src/l10n_defaults_gen.c"
  - "test/**"
  - "webui/test/**"
